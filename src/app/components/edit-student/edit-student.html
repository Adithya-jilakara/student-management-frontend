<div class="form-container">


<h2>Edit Student</h2>


<form 
[formGroup]="studentForm"
(ngSubmit)="updateStudent()">



<label>Name</label>

<input 
type="text"
formControlName="name">



<label>Email</label>

<input 
type="email"
formControlName="email">



<label>Department</label>

<input 
type="text"
formControlName="department">



<label>Age</label>

<input 
type="number"
formControlName="age">



<button type="submit">
Update Student
</button>



</form>


</div>
