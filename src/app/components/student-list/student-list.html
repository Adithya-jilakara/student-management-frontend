<div class="student-container">

  <h2>Student List</h2>
  <div class="search-box">
  <input
    type="text"
    placeholder="Search by name, email, or department"
    [(ngModel)]="searchText">
   </div>
  <table>

    <thead>

      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Department</th>
        <th>Age</th>
        <th>Actions</th>
      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let student of filteredStudents">

        <td>{{student.id}}</td>
        <td>{{student.name}}</td>
        <td>{{student.email}}</td>
        <td>{{student.department}}</td>
        <td>{{student.age}}</td>

        <td>
          <button class="edit-btn">Edit</button>
          <button class="delete-btn">Delete</button>
        </td>

      </tr>

    </tbody>

  </table>

</div>
